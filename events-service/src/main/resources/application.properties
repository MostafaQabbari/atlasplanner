server.port=8080
spring.application.name=events-service

# Ticketmaster API Key (loaded from .env via Docker)
ticketmaster.api.key=${TICKETMASTER_API_KEY:your_key_here}

# Database
spring.datasource.url=jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:atlasplanner}
spring.datasource.username=${DB_USER:atlas_user}
spring.datasource.password=${DB_PASSWORD:atlas_pass}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.jpa.hibernate.ddl-auto=update
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.show-sql=false

# JWT
jwt.secret=${JWT_SECRET:change_this_to_a_long_random_string_min_32_chars}
jwt.expiry=${JWT_EXPIRY_HOURS:24}

# Logging
logging.level.com.atlasplanner=DEBUG
